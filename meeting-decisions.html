<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>会议记录决策提炼器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card">
        <p class="eyebrow">Mini PRD / 极简版</p>
        <h1>会议记录决策提炼器</h1>
        <p class="intro">
          输入一段会议记录，快速提取核心决策；如果会议还没拍板，就只输出待确认事项。
        </p>
      </section>

      <section class="workspace">
        <div class="panel input-panel">
          <div class="panel-head">
            <h2>会议记录输入</h2>
            <span id="charCount" class="meta">0 / 3000</span>
          </div>

          <label class="field-label" for="meetingInput">单段会议记录</label>
          <textarea
            id="meetingInput"
            class="meeting-input"
            maxlength="3000"
            placeholder="例如：今天先同步一下背景。关于首页改版，大家讨论后决定下周先上线第一版，不等全部功能做完。第二阶段的发布时间还没定，需要产品和研发再确认..."
          ></textarea>

          <div class="actions">
            <button id="extractBtn" class="primary-btn" type="button">提取结果</button>
            <button id="clearBtn" class="secondary-btn" type="button">清空</button>
          </div>

          <p class="hint">一次只处理一段文本，只输出“核心决策”或“待确认事项”其中一种结果。</p>
        </div>

        <div class="panel output-panel">
          <div class="panel-head">
            <h2>提取结果</h2>
            <button id="copyBtn" class="text-btn" type="button">复制结果</button>
          </div>

          <div id="emptyState" class="empty-state">
            输出会自动二选一：
            <br />
            有明确拍板时显示核心决策；没有拍板时只显示待确认事项。
          </div>

          <div id="resultCard" class="result-card" hidden aria-live="polite">
            <div class="result-header">
              <span class="result-label">输出类型</span>
              <span id="resultType" class="result-type"></span>
            </div>
            <div id="resultList" class="result-list"></div>
          </div>

          <p id="errorText" class="error-text" role="alert"></p>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
