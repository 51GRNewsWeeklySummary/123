<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acronym Bot</title>
    <link rel="stylesheet" href="./acronym-bot-future.css" />
  </head>
  <body class="future-theme">
    <div class="scene" aria-hidden="true">
      <div class="scene-photo"></div>
      <div class="scene-vignette"></div>
      <div class="scene-mist"></div>
      <div class="butterfly-field">
        <span class="butterfly butterfly-a" data-depth="0.018" data-base-x="14" data-base-y="24">
          <i class="wing upper upper-left"></i>
          <i class="wing upper upper-right"></i>
          <i class="wing lower lower-left"></i>
          <i class="wing lower lower-right"></i>
          <i class="body-core"></i>
          <i class="antenna antenna-left"></i>
          <i class="antenna antenna-right"></i>
        </span>
        <span class="butterfly butterfly-b" data-depth="0.014" data-base-x="74" data-base-y="18">
          <i class="wing upper upper-left"></i>
          <i class="wing upper upper-right"></i>
          <i class="wing lower lower-left"></i>
          <i class="wing lower lower-right"></i>
          <i class="body-core"></i>
          <i class="antenna antenna-left"></i>
          <i class="antenna antenna-right"></i>
        </span>
        <span class="butterfly butterfly-c" data-depth="0.02" data-base-x="24" data-base-y="66">
          <i class="wing upper upper-left"></i>
          <i class="wing upper upper-right"></i>
          <i class="wing lower lower-left"></i>
          <i class="wing lower lower-right"></i>
          <i class="body-core"></i>
          <i class="antenna antenna-left"></i>
          <i class="antenna antenna-right"></i>
        </span>
        <span class="butterfly butterfly-d" data-depth="0.012" data-base-x="82" data-base-y="58">
          <i class="wing upper upper-left"></i>
          <i class="wing upper upper-right"></i>
          <i class="wing lower lower-left"></i>
          <i class="wing lower lower-right"></i>
          <i class="body-core"></i>
          <i class="antenna antenna-left"></i>
          <i class="antenna antenna-right"></i>
        </span>
      </div>
    </div>

    <main class="app-shell">
      <section class="hero-card">
        <p class="eyebrow">Knowledge Glossary</p>
        <h1>Acronym Bot</h1>
        <p class="intro">
          输入缩写，快速查看释义，并在支持时一键获取中文结果。
        </p>
      </section>

      <section class="workspace">
        <div class="panel input-panel">
          <div class="panel-head">
            <h2>输入缩写</h2>
            <span class="meta">Instant Lookup</span>
          </div>

          <label class="field-label" for="botInput">Acronym Query</label>
          <input
            id="botInput"
            class="abbr-input"
            type="text"
            maxlength="24"
            placeholder="例如：DfE / KPI / MVP / OKR"
            autocomplete="off"
          />

          <div class="actions">
            <button id="searchBtn" class="primary-btn" type="button">查询释义</button>
            <button id="clearBtn" class="secondary-btn" type="button">清空</button>
          </div>

          <p class="hint">
            支持大小写不敏感查询，适合快速确认项目、产品、组织与方法论相关缩写。
          </p>
        </div>

        <div class="panel output-panel">
          <div class="panel-head">
            <h2>查询结果</h2>
            <div class="panel-tools">
              <button id="translateBtn" class="text-btn" type="button">翻译为中文</button>
              <button id="copyBtn" class="text-btn" type="button">复制结果</button>
            </div>
          </div>

          <div id="emptyState" class="empty-state">
            输入一个缩写，系统会返回首个匹配结果；如支持中文释义，可继续一键翻译。
          </div>

          <div id="resultCard" class="result-card" hidden aria-live="polite">
            <div class="result-row">
              <span class="result-label">缩写</span>
              <span id="abbrValue" class="result-value"></span>
            </div>
            <div class="result-row">
              <span class="result-label">释义</span>
              <span id="meaningValue" class="result-value"></span>
            </div>
            <div id="translationRow" class="result-row translation-row" hidden>
              <span class="result-label">中文释义</span>
              <span id="translationValue" class="result-value"></span>
            </div>
          </div>

          <p id="errorText" class="error-text" role="alert"></p>
        </div>
      </section>
    </main>

    <script src="./acronym-bot-web.js"></script>
  </body>
</html>
