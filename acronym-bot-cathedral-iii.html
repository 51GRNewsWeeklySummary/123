<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Acronym Bot 穹顶版 III</title>
    <link rel="stylesheet" href="./acronym-bot-cathedral-variants.css" />
  </head>
  <body class="cathedral-theme variant-iii">
    <div class="scene" aria-hidden="true">
      <div class="scene-glow scene-glow-left"></div>
      <div class="scene-glow scene-glow-right"></div>
      <div class="vault-fresco"></div>
      <div class="dome-ring dome-ring-outer"></div>
      <div class="dome-ring dome-ring-inner"></div>
      <div class="apse-light"></div>
      <div class="nave-arch arch-left"></div>
      <div class="nave-arch arch-center"></div>
      <div class="nave-arch arch-right"></div>
      <div class="column-row">
        <span class="column column-1"></span>
        <span class="column column-2"></span>
        <span class="column column-3"></span>
        <span class="column column-4"></span>
      </div>
      <div class="bokeh-cloud">
        <span class="bokeh bokeh-1"></span>
        <span class="bokeh bokeh-2"></span>
        <span class="bokeh bokeh-3"></span>
        <span class="bokeh bokeh-4"></span>
      </div>
    </div>

    <main class="app-shell">
      <section class="hero-card">
        <p class="eyebrow">Release / Cathedral Study III</p>
        <h1>Acronym Bot 穹顶版 III</h1>
        <p class="intro">高频缩写查询工具。输入缩写，立即返回释义，并支持一键查看中文结果。</p>
      </section>

      <section class="workspace">
        <div class="panel input-panel">
          <div class="panel-head">
            <h2>输入缩写</h2>
            <span class="meta">Instant Lookup</span>
          </div>
          <label class="field-label" for="botInput">Acronym Query</label>
          <input id="botInput" class="abbr-input" type="text" maxlength="24" placeholder="例如：DfE / KPI / MVP / OKR" autocomplete="off" />
          <div class="actions">
            <button id="searchBtn" class="primary-btn" type="button">查询释义</button>
            <button id="clearBtn" class="secondary-btn" type="button">清空</button>
          </div>
          <p class="hint">支持大小写不敏感查询，适合快速确认项目、产品、组织与方法论相关缩写。</p>
        </div>

        <div class="panel output-panel">
          <div class="panel-head">
            <h2>查询结果</h2>
            <div class="panel-tools">
              <button id="translateBtn" class="text-btn" type="button">翻译为中文</button>
              <button id="copyBtn" class="text-btn" type="button">复制结果</button>
            </div>
          </div>
          <div id="emptyState" class="empty-state">输入一个缩写，系统会返回首个匹配结果；如支持中文释义，可继续一键翻译。</div>
          <div id="resultCard" class="result-card" hidden aria-live="polite">
            <div class="result-row">
              <span class="result-label">缩写</span>
              <span id="abbrValue" class="result-value"></span>
            </div>
            <div class="result-row">
              <span class="result-label">释义</span>
              <span id="meaningValue" class="result-value"></span>
            </div>
            <div id="translationRow" class="result-row translation-row" hidden>
              <span class="result-label">中文释义</span>
              <span id="translationValue" class="result-value"></span>
            </div>
          </div>
          <p id="errorText" class="error-text" role="alert"></p>
        </div>
      </section>
    </main>
    <script src="./acronym-bot-web.js"></script>
  </body>
</html>
