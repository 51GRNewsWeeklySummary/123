<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>51在沙特-GR News Weekly Summary</title>
  <style>
    :root {
      --bg: #f3f6f8;
      --panel: #ffffff;
      --panel-alt: #eef3f6;
      --text: #18242d;
      --muted: #5f717d;
      --line: #d3dde5;
      --accent: #0f7a70;
      --accent-soft: #def4f1;
      --blue: #1a78a6;
      --blue-soft: #dff1f8;
      --amber: #a86f00;
      --amber-soft: #fff1d6;
      --red: #b43d3d;
      --red-soft: #fde6e6;
      --shadow: 0 14px 34px rgba(24, 36, 45, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }

    button, input, select {
      font: inherit;
    }

    img {
      display: block;
      max-width: 100%;
    }

    .shell {
      max-width: 1320px;
      margin: 0 auto;
      padding: 20px;
    }

    .topband {
      display: grid;
      grid-template-columns: 1fr;
      gap: 18px;
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      box-shadow: var(--shadow);
    }

    .topband h1 {
      margin: 0;
      font-size: 28px;
    }

    .topband p {
      margin: 6px 0 0;
      color: var(--muted);
      max-width: 760px;
    }

    .toolbar {
      margin-top: 16px;
      display: grid;
      grid-template-columns: 1.5fr 1.1fr 1fr;
      gap: 14px;
    }

    .toolbar-block,
    .section,
    .stat,
    .item-card,
    .detail-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .toolbar-block {
      padding: 14px;
      min-height: 116px;
    }

    .toolbar-title,
    .section-title {
      margin: 0 0 10px;
      font-size: 15px;
      font-weight: 700;
    }

    .chip-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .chip,
    .ghost-btn,
    .solid-btn {
      min-height: 36px;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      cursor: pointer;
    }

    .chip.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .ghost-btn:hover,
    .solid-btn:hover,
    .chip:hover {
      border-color: var(--accent);
    }

    .solid-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
      font-weight: 700;
    }

    .control-row {
      display: grid;
      grid-template-columns: 1fr 170px 140px;
      gap: 10px;
    }

    .control-row input,
    .control-row select {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 8px 12px;
      background: #fff;
      color: var(--text);
    }

    .stats {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .stat {
      padding: 16px;
      min-height: 118px;
    }

    .stat span {
      color: var(--muted);
      font-size: 13px;
    }

    .stat strong {
      display: block;
      margin: 8px 0 6px;
      font-size: 30px;
    }

    .stat small {
      color: var(--muted);
      font-size: 13px;
    }

    .stat.accent {
      background: #f4fbfa;
      border-color: #c5e7e1;
    }

    .stat.warn {
      background: #fff9ee;
      border-color: #f1dfb8;
    }

    .stat.risk {
      background: #fff7f7;
      border-color: #f1cfcf;
    }

    .main-grid {
      margin-top: 16px;
      display: grid;
      grid-template-columns: minmax(0, 1.9fr) minmax(320px, 0.9fr);
      gap: 16px;
      align-items: start;
    }

    .section {
      padding: 16px;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .section-head p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .item-list {
      display: grid;
      gap: 12px;
    }

    .item-card {
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: start;
    }

    .item-card h3 {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.35;
    }

    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 2px 8px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
    }

    .badge.policy { background: var(--blue-soft); color: var(--blue); }
    .badge.sentiment { background: var(--accent-soft); color: var(--accent); }
    .badge.industry { background: #ece9fb; color: #6154a6; }
    .badge.media { background: #e6f1ff; color: #245eab; }
    .badge.priority-high { background: var(--red-soft); color: var(--red); }
    .badge.priority-mid { background: var(--amber-soft); color: var(--amber); }
    .badge.priority-low { background: #edf3ef; color: #466050; }

    .item-summary {
      margin: 0;
      color: var(--text);
    }

    .item-why {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .item-actions {
      display: grid;
      gap: 8px;
      min-width: 126px;
    }

    .detail-panel {
      padding: 16px;
      position: sticky;
      top: 16px;
    }

    .detail-panel h2 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.35;
    }

    .detail-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
    }

    .detail-block {
      padding-top: 12px;
      border-top: 1px solid var(--line);
      margin-top: 12px;
    }

    .detail-block strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .detail-block p,
    .detail-block li {
      margin: 0;
      color: var(--text);
    }

    .detail-block ul {
      margin: 0;
      padding-left: 18px;
    }

    .detail-links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .detail-links a {
      color: var(--blue);
      text-decoration: none;
      word-break: break-all;
    }

    .detail-preview-title {
      margin: 0 0 8px;
      font-size: 18px;
      line-height: 1.4;
    }

    .favorite-hint {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .favorite-list {
      display: grid;
      gap: 10px;
      margin-top: 14px;
    }

    .favorite-item {
      width: 100%;
      text-align: left;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfd;
      cursor: pointer;
    }

    .favorite-item:hover {
      border-color: var(--accent);
      background: #f6fbfa;
    }

    .favorite-item strong {
      display: block;
      margin-bottom: 6px;
      font-size: 14px;
      line-height: 1.4;
    }

    .favorite-item span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .favorite-empty {
      margin-top: 14px;
      padding: 18px 14px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--muted);
      background: #fbfcfd;
      font-size: 13px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      display: none;
      align-items: stretch;
      justify-content: center;
      background: rgba(17, 29, 37, 0.56);
      z-index: 1000;
      padding: 20px;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-card {
      width: min(1180px, 100%);
      height: 100%;
      max-height: calc(100vh - 40px);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 24px 60px rgba(24, 36, 45, 0.24);
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    .modal-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 20px;
      border-bottom: 1px solid var(--line);
      background: #fbfcfd;
    }

    .modal-head h2 {
      margin: 0;
      font-size: 28px;
      line-height: 1.35;
    }

    .modal-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      margin-top: 10px;
    }

    .modal-close {
      min-width: 88px;
    }

    .modal-content {
      overflow-y: auto;
      padding: 20px;
    }

    .modal-section {
      padding-top: 14px;
      margin-top: 14px;
      border-top: 1px solid var(--line);
    }

    .modal-section:first-child {
      margin-top: 0;
      padding-top: 0;
      border-top: 0;
    }

    .modal-section h3 {
      margin: 0 0 8px;
      font-size: 16px;
    }

    .modal-section p {
      margin: 0;
    }

    .modal-links {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .modal-links a {
      color: var(--blue);
      text-decoration: none;
      word-break: break-all;
    }

    .empty {
      padding: 28px 16px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fbfcfd;
    }

    @media (max-width: 1100px) {
      .toolbar,
      .main-grid {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .detail-panel {
        position: static;
      }
    }

    @media (max-width: 720px) {
      .shell {
        padding: 14px;
      }

      .control-row,
      .stats {
        grid-template-columns: 1fr;
      }

      .item-card {
        grid-template-columns: 1fr;
      }

      .item-actions {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .modal-overlay {
        padding: 10px;
      }

      .modal-card {
        max-height: calc(100vh - 20px);
      }

      .modal-head {
        padding: 14px;
      }

      .modal-head h2 {
        font-size: 22px;
      }

      .modal-content {
        padding: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topband">
      <div>
        <h1>51在沙特-GR News Weekly Summary</h1>
      </div>
    </header>

    <section class="toolbar">
      <div class="toolbar-block">
        <h2 class="toolbar-title">时间范围</h2>
        <div class="chip-grid" id="rangeChips">
          <button class="chip" data-range="3">近三天</button>
          <button class="chip" data-range="7">近一周</button>
          <button class="chip" data-range="30">近一月</button>
          <button class="chip active" data-range="all">全部</button>
        </div>
      </div>

      <div class="toolbar-block">
        <h2 class="toolbar-title">分类筛选</h2>
        <div class="chip-row" id="categoryChips">
          <button class="chip active" data-category="all">全部</button>
          <button class="chip" data-category="政策">政策</button>
          <button class="chip" data-category="行业">行业</button>
          <button class="chip" data-category="媒体">媒体</button>
        </div>
      </div>

      <div class="toolbar-block">
        <h2 class="toolbar-title">搜索与排序</h2>
        <div class="control-row">
          <input id="searchInput" type="search" placeholder="搜标题、平台、标签、摘要">
          <select id="sortSelect" aria-label="排序方式">
            <option value="desc">最新在前</option>
            <option value="asc">最早在前</option>
            <option value="priority">优先级优先</option>
          </select>
          <button class="solid-btn" id="focusToggle" type="button">仅看重点</button>
        </div>
      </div>
    </section>

    <section class="stats" aria-label="统计概览">
      <article class="stat accent">
        <span>当前命中条目</span>
        <strong id="countAll">0</strong>
      </article>
      <article class="stat risk">
        <span>高优先级</span>
        <strong id="countHigh">0</strong>
      </article>
      <article class="stat">
        <span>最新日期</span>
        <strong id="latestDate">--</strong>
      </article>
    </section>

    <div class="main-grid">
      <section class="section">
        <div class="section-head">
          <div>
            <h2 class="section-title">信息卡片</h2>
          </div>
          <button class="ghost-btn" id="resetButton" type="button">重置筛选</button>
        </div>

        <div class="item-list" id="itemList"></div>
      </section>

      <aside class="detail-panel" id="detailPanel">
        <h2>收藏夹</h2>
        <div class="detail-meta">
          <span>单击打开详情，双击取消收藏。</span>
        </div>
      </aside>
    </div>
  </div>

  <div class="modal-overlay" id="detailModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
      <div class="modal-head">
        <div>
          <h2 id="modalTitle">查看详情</h2>
          <div class="modal-meta" id="modalMeta"></div>
        </div>
        <button class="ghost-btn modal-close" id="modalClose" type="button">关闭</button>
      </div>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

    const categoryClassMap = {

      mid: "中优先级",
      low: "低优先级"
    };

    const priorityClassMap = {
      high: "priority-high",
      mid: "priority-mid",
      low: "priority-low"
    };

    let currentRange = "all";
    let currentCategory = "all";
    let currentSort = "desc";
    let currentSearch = "";
    let featuredOnly = false;
    let currentDetailId = weeklyItems[0]?.id ?? null;
    const storageKeys = {
      favorites: "gr_weekly_favorites",
      deleted: "gr_weekly_deleted"
    };

    function readStoredIds(key) {
      try {
        const raw = window.localStorage.getItem(key);
        if (!raw) return [];
        const parsed = JSON.parse(raw);
        if (!Array.isArray(parsed)) return [];
        return parsed.map((value) => Number(value)).filter((value) => Number.isFinite(value));
      } catch (error) {
        return [];
      }
    }

    function saveStoredIds(key, set) {
      try {
        window.localStorage.setItem(key, JSON.stringify([...set]));
      } catch (error) {
        console.warn(`无法写入本地存储: ${key}`, error);
      }
    }

    function parseHashIds(name) {
      try {
        const hash = window.location.hash.startsWith("#") ? window.location.hash.slice(1) : "";
        const params = new URLSearchParams(hash);
        const raw = params.get(name);
        if (!raw) return [];
        return raw
          .split(",")
          .map((value) => Number(value))
          .filter((value) => Number.isFinite(value));
      } catch (error) {
        return [];
      }
    }

    function syncStateToHash() {
      try {
        const params = new URLSearchParams();
        if (favoriteIds.size) {
          params.set("fav", [...favoriteIds].join(","));
        }
        if (deletedIds.size) {
          params.set("del", [...deletedIds].join(","));
        }
        const nextHash = params.toString();
        const nextUrl = `${window.location.pathname}${window.location.search}${nextHash ? `#${nextHash}` : ""}`;
        window.history.replaceState(null, "", nextUrl);
      } catch (error) {
        console.warn("无法同步状态到地址栏", error);
      }
    }

    const validItemIds = new Set(weeklyItems.map((item) => item.id));
    const favoriteIds = new Set([
      ...readStoredIds(storageKeys.favorites),
      ...parseHashIds("fav")
    ].filter((id) => validItemIds.has(id)));
    const deletedIds = new Set([
      ...readStoredIds(storageKeys.deleted),
      ...parseHashIds("del")
    ].filter((id) => validItemIds.has(id)));
    saveStoredIds(storageKeys.favorites, favoriteIds);
    saveStoredIds(storageKeys.deleted, deletedIds);

    const itemList = document.getElementById("itemList");
    const detailPanel = document.getElementById("detailPanel");
    const detailModal = document.getElementById("detailModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalMeta = document.getElementById("modalMeta");
    const modalContent = document.getElementById("modalContent");
    const modalClose = document.getElementById("modalClose");
    const searchInput = document.getElementById("searchInput");
    const sortSelect = document.getElementById("sortSelect");
    const focusToggle = document.getElementById("focusToggle");

    function formatDate(dateString) {
      const date = new Date(dateString + "T00:00:00");
      return new Intl.DateTimeFormat("zh-CN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).format(date);
    }

    function daysDiff(dateString) {
      const today = new Date();
      const date = new Date(dateString + "T00:00:00");
      const diff = today - date;
      return Math.floor(diff / (1000 * 60 * 60 * 24));
    }

    function getFilteredItems() {
      let result = weeklyItems.filter((item) => !deletedIds.has(item.id));

      if (currentRange !== "all") {
        const maxDays = Number(currentRange);
        result = result.filter((item) => daysDiff(item.date) <= maxDays);
      }

      if (currentCategory !== "all") {
        result = result.filter((item) => item.category === currentCategory);
      }

      if (featuredOnly) {
        result = result.filter((item) => item.featured);
      }

      if (currentSearch.trim()) {
        const keyword = currentSearch.trim().toLowerCase();
        result = result.filter((item) => {
          const haystack = [
            item.title,
            item.platform,
            item.source,
            item.summary,
            item.whyItMatters,
            item.nextAction,
            ...(item.tags || [])
          ].join(" ").toLowerCase();
          return haystack.includes(keyword);
        });
      }

      if (currentSort === "desc") {
        result.sort((a, b) => b.date.localeCompare(a.date));
      } else if (currentSort === "asc") {
        result.sort((a, b) => a.date.localeCompare(b.date));
      } else {
        const weight = { high: 3, mid: 2, low: 1 };
        result.sort((a, b) => {
          const diff = weight[b.priority] - weight[a.priority];
          return diff !== 0 ? diff : b.date.localeCompare(a.date);
        });
      }

      return result;
    }

    function renderStats(items) {
      document.getElementById("countAll").textContent = String(items.length);
      document.getElementById("countHigh").textContent = String(items.filter((item) => item.priority === "high").length);
      document.getElementById("latestDate").textContent = items.length ? formatDate(items[0].date) : "--";
    }

    function renderList(items) {
      if (!items.length) {
        itemList.innerHTML = '<div class="empty">当前没有条目。</div>';
        return;
      }

      itemList.innerHTML = items.map((item) => `
        <article class="item-card">
          <div>
            <h3>${item.title}</h3>
            <div class="item-meta">
              <span class="badge ${categoryClassMap[item.category]}">${item.category}</span>
              <span class="badge ${priorityClassMap[item.priority]}">${priorityLabelMap[item.priority]}</span>
              <span>${formatDate(item.date)}</span>

              <span>${item.source}</span>
            </div>
            <p class="item-summary">${item.summary}</p>
            <p class="item-why"><strong style="font-size:14px; color: var(--text);">为什么重要：</strong>${item.whyItMatters}</p>
            <div class="item-meta" style="margin-top: 12px;">
              ${(item.tags || []).map((tag) => `<span class="badge">${tag}</span>`).join("")}
            </div>
          </div>
          <div class="item-actions">
            <button class="ghost-btn" type="button" data-detail="${item.id}">查看详情</button>
            <button class="ghost-btn" type="button" data-favorite="${item.id}">${favoriteIds.has(item.id) ? "已收藏" : "收藏"}</button>
            <button class="ghost-btn" type="button" data-copy="${item.id}">复制摘要</button>
            <button class="ghost-btn" type="button" data-delete="${item.id}">删除</button>
          </div>
        </article>
      `).join("");
    }

    function renderDetailPanel() {
      const favorites = [...favoriteIds]
        .map((id) => weeklyItems.find((item) => item.id === id))
        .filter((item) => item && !deletedIds.has(item.id));

      if (!favorites.length) {
        detailPanel.innerHTML = `
          <h2>收藏夹</h2>
          <div class="detail-meta"><span>单击打开详情，双击取消收藏。</span></div>
          <div class="favorite-empty">左侧点“收藏”后，重要条目会沉淀到这里，方便你做一轮筛选和汇报取舍。</div>
        `;
        return;
      }

      detailPanel.innerHTML = `
        <h2>收藏夹</h2>
        <div class="detail-meta">
          <span>已收藏 ${favorites.length} 条</span>
        </div>
        <p class="favorite-hint">单击打开详情，双击取消收藏。</p>
        <div class="favorite-list">
          ${favorites.map((item) => `
            <button class="favorite-item" type="button" data-favorite-open="${item.id}" title="单击打开详情，双击取消收藏">
              <strong>${item.title}</strong>
              <span>${formatDate(item.date)} · ${item.category} · ${item.source}</span>
            </button>
          `).join("")}
        </div>
      `;

    function openDetailModal(item) {
      if (!item) return;

      modalTitle.textContent = item.title;

      modalContent.innerHTML = `

            }
          </div>
        </section>
      `;

      detailModal.classList.add("open");
      detailModal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closeDetailModal() {
      detailModal.classList.remove("open");
      detailModal.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    function refresh() {
      const items = getFilteredItems();
      renderStats(items);
      renderList(items);

      if (!items.find((item) => item.id === currentDetailId)) {
        currentDetailId = items[0]?.id ?? null;
      }
      renderDetailPanel();
    }

    document.getElementById("rangeChips").addEventListener("click", (event) => {
      const chip = event.target.closest("[data-range]");
      if (!chip) return;
      currentRange = chip.dataset.range;
      document.querySelectorAll("#rangeChips .chip").forEach((node) => node.classList.toggle("active", node === chip));
      refresh();
    });

    document.getElementById("categoryChips").addEventListener("click", (event) => {
      const chip = event.target.closest("[data-category]");
      if (!chip) return;
      currentCategory = chip.dataset.category;
      document.querySelectorAll("#categoryChips .chip").forEach((node) => node.classList.toggle("active", node === chip));
      refresh();
    });

    searchInput.addEventListener("input", () => {
      currentSearch = searchInput.value;
      refresh();
    });

    sortSelect.addEventListener("change", () => {
      currentSort = sortSelect.value;
      refresh();
    });

    focusToggle.addEventListener("click", () => {
      featuredOnly = !featuredOnly;
      focusToggle.textContent = featuredOnly ? "已开启重点模式" : "仅看重点";
      focusToggle.classList.toggle("solid-btn", featuredOnly);
      refresh();
    });

    document.getElementById("resetButton").addEventListener("click", () => {
      currentRange = "all";
      currentCategory = "all";
      currentSort = "desc";
      currentSearch = "";
      featuredOnly = false;
      searchInput.value = "";
      sortSelect.value = "desc";
      focusToggle.textContent = "仅看重点";
      focusToggle.classList.remove("solid-btn");
      document.querySelectorAll("#rangeChips .chip").forEach((node) => node.classList.toggle("active", node.dataset.range === "all"));
      document.querySelectorAll("#categoryChips .chip").forEach((node) => node.classList.toggle("active", node.dataset.category === "all"));
      refresh();
    });

    itemList.addEventListener("click", async (event) => {
      const detailButton = event.target.closest("[data-detail]");
      const favoriteButton = event.target.closest("[data-favorite]");
      const copyButton = event.target.closest("[data-copy]");
      const deleteButton = event.target.closest("[data-delete]");

      if (detailButton) {
        currentDetailId = Number(detailButton.dataset.detail);
        refresh();
        openDetailModal(weeklyItems.find((entry) => entry.id === currentDetailId));
        return;
      }

      if (favoriteButton) {
        const id = Number(favoriteButton.dataset.favorite);
        if (favoriteIds.has(id)) {
          favoriteIds.delete(id);
        } else {
          favoriteIds.add(id);
        }
        saveStoredIds(storageKeys.favorites, favoriteIds);
        syncStateToHash();
        refresh();
        return;
      }

      if (copyButton) {
        const item = weeklyItems.find((entry) => entry.id === Number(copyButton.dataset.copy));
        if (!item) return;
        const text = `${item.title}\n日期：${formatDate(item.date)}\n平台：${item.platform}\n来源：${item.source}\n摘要：${item.summary}\n为什么重要：${item.whyItMatters}\n建议动作：${item.nextAction}`;
        try {
          await navigator.clipboard.writeText(text);
          copyButton.textContent = "已复制";
          window.setTimeout(() => {
            copyButton.textContent = "复制摘要";
          }, 1200);
        } catch (error) {
          alert("浏览器未允许复制，请手动复制右侧详情。");
        }
        return;
      }

      if (deleteButton) {
        const id = Number(deleteButton.dataset.delete);
        const item = weeklyItems.find((entry) => entry.id === id);
        if (!item) return;
        const confirmed = window.confirm(`确认删除这条信息吗？\n\n${item.title}`);
        if (!confirmed) return;

        const index = weeklyItems.findIndex((entry) => entry.id === id);
        if (index === -1) return;
        deletedIds.add(id);
        favoriteIds.delete(id);
        saveStoredIds(storageKeys.deleted, deletedIds);
        saveStoredIds(storageKeys.favorites, favoriteIds);
        syncStateToHash();

        if (currentDetailId === id) {
          const visibleItems = getFilteredItems();
          currentDetailId = visibleItems[index]?.id ?? visibleItems[index - 1]?.id ?? visibleItems[0]?.id ?? null;
        }

        refresh();
      }
    });

    let favoriteClickTimer = null;

    detailPanel.addEventListener("click", (event) => {
      const favoriteOpen = event.target.closest("[data-favorite-open]");
      if (!favoriteOpen) return;
      const id = Number(favoriteOpen.dataset.favoriteOpen);
      if (favoriteClickTimer) {
        window.clearTimeout(favoriteClickTimer);
        favoriteClickTimer = null;
      }
      favoriteClickTimer = window.setTimeout(() => {
        currentDetailId = id;
        openDetailModal(weeklyItems.find((entry) => entry.id === id));
        favoriteClickTimer = null;
      }, 220);
    });

    detailPanel.addEventListener("dblclick", (event) => {
      const favoriteOpen = event.target.closest("[data-favorite-open]");
      if (!favoriteOpen) return;
      const id = Number(favoriteOpen.dataset.favoriteOpen);
      if (favoriteClickTimer) {
        window.clearTimeout(favoriteClickTimer);
        favoriteClickTimer = null;
      }
      if (!favoriteIds.has(id)) return;
      favoriteIds.delete(id);
      saveStoredIds(storageKeys.favorites, favoriteIds);
      syncStateToHash();
      refresh();
    });

    syncStateToHash();
    modalClose.addEventListener("click", closeDetailModal);

    detailModal.addEventListener("click", (event) => {
      if (event.target === detailModal) {
        closeDetailModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && detailModal.classList.contains("open")) {
        closeDetailModal();
      }
    });

    refresh();
  </script>
</body>
</html>
