<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>管培生亮点压缩器</title>
    <link rel="stylesheet" href="./highlight-compressor.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-card">
        <p class="eyebrow">Mini PRD / 收敛版</p>
        <h1>管培生亮点压缩器</h1>
        <p class="intro">
          输入一段 2000 字以内的过程描述，输出最多 3 条可直接发给 Mentor 的“动作 + 结果”亮点。
        </p>
      </section>

      <section class="workspace">
        <div class="panel input-panel">
          <div class="panel-head">
            <h2>原始过程描述</h2>
            <span id="charCount" class="meta">0 / 2000</span>
          </div>
          <textarea
            id="sourceText"
            maxlength="2000"
            placeholder="例如：本周我先梳理了客服反馈里的高频问题，和运营一起确认了口径，然后整理成 FAQ 初版并同步给 Mentor..."
          ></textarea>
          <div class="actions">
            <button id="compressBtn" class="primary-btn" type="button">生成亮点</button>
            <button id="clearBtn" class="secondary-btn" type="button">清空</button>
          </div>
          <p class="hint">仅支持纯文本粘贴，不支持文件、图片、外部抓取。</p>
        </div>

        <div class="panel output-panel">
          <div class="panel-head">
            <h2>Mentor 展示亮点</h2>
            <button id="copyBtn" class="text-btn" type="button">复制结果</button>
          </div>
          <div id="emptyState" class="empty-state">
            结果会严格控制在 1-3 条，每条一行，只保留“动作 + 结果”。
          </div>
          <div id="resultBox" class="result-box" aria-live="polite"></div>
          <p id="errorText" class="error-text" role="alert"></p>
        </div>
      </section>
    </main>

    <script src="./highlight-compressor.js"></script>
  </body>
</html>
